<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>multi media</title>
  <link rel="stylesheet" href="task6.css">
</head>
<body>
    <section align="center">
      <h1 style="margin-right: 20%;">Multi Media</h1><br>
      <nav  style="display: flex; color: black; gap: 35px; width: 20%; margin-left: 30%;">
        <button ><a href="#map">Map</a></button>
        <button ><a href="#youtube">Youtube</a></button>
      </nav>
      
    </section>
    <div style="display: inline-flex; gap: 100px; margin-left: 10%;">
    <section class="box sec" id="youtube">
      
      <div>
        <h1>Youtube Vedio</h1>
        
      </div>
      <hr><br><br>
      
      <div>
        <iframe width="530" height="450" src="https://www.youtube.com/embed/czgm5uaO3gI?si=gOpTqioNqzNoYoWP" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
      </div>
        <br><br><hr>
      </section>
    <section id="map" class=" box sec">
      
        <div>
          <h1>Google Map</h1>
        </div>
        <hr>
        <br><br>
        <div>
          <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d28084.907497988577!2d77.3226496!3d28.370534399999997!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sin!4v1774518463501!5m2!1sen!2sin" width="540" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
         <br><br><hr>
    </section>
    </div>

</body>
</html>
