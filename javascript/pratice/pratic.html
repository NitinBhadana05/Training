<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pratice</title>
  <link rel="stylesheet" href="pratice.css">
</head>
<body>
    <section>
        <div>
          <input type="text" id="input">
        <button id="btn">Show</button>
        <p id="output"></p>
        </div>

        <div>
          <table border="1">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
              </tr>
            </thead>

            <tbody id="data"></tbody>
          </table>

        </div>

          <div id="container"></div>
        </div>
        
        <div>
          <input type="text" id="search">
         
          <ul id="list"></ul>
        </div>

        <div>
          <form action="#" id="form">
            <label for="name">Name</label>&nbsp;&nbsp;&nbsp;&nbsp;
            <input type="text" id="name" placeholder="enter your Name" autocomplete="none"><br><br>
            <label for="email">Email</label>&nbsp;&nbsp;&nbsp;&nbsp;
            <input type="email" id="email" placeholder="enter your Email" autocomplete="none"> <br><br>
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="enter your Password" ><br><br>
            <button type="submit" id="submit" >Submit</button>
          </form>
        </div>

        <div>
          <h2>Todo</h2>

          <input id="taskInput">
          <button id="addBtn">Add</button>

          <ul id="taskList"></ul>
          <p id="taskError"></p>
        </div>



    </section>
    <script src="pratice.js"></script>
</body>
</html>
