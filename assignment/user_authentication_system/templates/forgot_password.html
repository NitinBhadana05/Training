{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<section class="grid w-full gap-6 xl:grid-cols-[1.02fr_0.98fr]">
    

    <div class="admin-glass admin-card rounded-[2rem] border border-slate-200/70 p-6 lg:p-8">
        <p class="text-xs font-semibold uppercase tracking-[0.24em] text-steel">Recovery request</p>
        <h2 class="mt-2 font-display text-3xl font-bold text-night">Forgot password</h2>
        <p class="mt-3 text-sm leading-6 text-steel">Enter your email address to initiate the password recovery process.</p>

        {% include "partials/messages.html" %}

        <form method="post" action="/forgot-password" class="mt-8 space-y-5" data-validate>
            <div>
                <label for="email" class="mb-2 block text-sm font-medium text-slate-700">Email address</label>
                <input id="email" name="email" type="email" value="{{ form_data.email if form_data else '' }}" required
                    class="w-full rounded-[1.35rem] border border-slate-200 bg-white px-4 py-3.5 outline-none ring-1 ring-slate-200 transition focus:border-sky-300 focus:ring-sky-200">
            </div>
            <button type="submit" class="w-full rounded-[1.35rem] bg-night px-4 py-3.5 text-sm font-semibold text-white shadow-panel transition hover:bg-slate-800">
                Send reset link
            </button>
        </form>

        <div class="mt-6 rounded-[1.35rem] bg-white/90 px-4 py-4 ring-1 ring-slate-200">
            <a href="/login" class="text-sm font-semibold text-cyan hover:text-sky-700">Back to login</a>
        </div>
    </div>
</section>
{% endblock %}
