{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<section class="w-full max-w-2xl rounded-[2rem] bg-white p-6 shadow-soft sm:p-8">
    <p class="text-sm font-medium uppercase tracking-[0.2em] text-gold">Password recovery</p>
    <h1 class="mt-3 text-3xl font-semibold">Forgot password</h1>
    <p class="mt-2 text-sm text-slate-600"></p>

    {% include "partials/messages.html" %}

    <form method="post" action="/forgot-password" class="mt-6 space-y-5" data-validate>
        <div>
            <label for="email" class="mb-2 block text-sm font-medium text-slate-700">Email address</label>
            <input id="email" name="email" type="email" value="{{ form_data.email if form_data else '' }}" required
                class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none transition focus:border-gold focus:bg-white focus:ring-2 focus:ring-amber-100">
        </div>
        <button type="submit" class="w-full rounded-2xl bg-ink px-4 py-3 text-sm font-semibold text-white transition hover:bg-slate-800">
            Send
        </button>
    </form>

    <p class="mt-6 text-sm text-slate-600">
        <a href="/login" class="font-semibold text-ember transition hover:text-orange-700">Back to login</a>
    </p>
</section>
{% endblock %}
