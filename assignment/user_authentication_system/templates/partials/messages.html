{% if error %}
    <div class="mb-5 rounded-[1.35rem] border border-red-200/80 bg-red-50/90 px-4 py-3 text-sm text-red-700 shadow-panel">
        {{ error }}
    </div>
{% endif %}

{% if message %}
    <div class="mb-5 rounded-[1.35rem] border border-emerald-200/80 bg-emerald-50/90 px-4 py-3 text-sm text-emerald-700 shadow-panel">
        {{ message }}
    </div>
{% endif %}
