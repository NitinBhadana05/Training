{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<section class="w-full max-w-2xl rounded-[2rem] bg-white p-6 shadow-soft sm:p-8">
    <p class="text-sm font-medium uppercase tracking-[0.2em] text-gold">Password recovery</p>
    <h1 class="mt-3 text-3xl font-semibold">Reset password</h1>
    <p class="mt-2 text-sm text-slate-600"></p>

    {% include "partials/messages.html" %}

    <form method="post" action="/reset-password" class="mt-6 space-y-5" data-validate>
        <input type="hidden" name="token" value="{{ token or '' }}">
        <div>
            <label for="password" class="mb-2 block text-sm font-medium text-slate-700">New password</label>
            <input id="password" name="password" type="password" required minlength="8" pattern="^(?=.*[!@#$%^&*(),.?&quot;:{}|&lt;&gt;_\-+=\/\\[\];']).{8,}$"
                class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none transition focus:border-gold focus:bg-white focus:ring-2 focus:ring-amber-100">
            <p class="mt-2 text-xs text-slate-500">At least 8 characters and one special character.</p>
        </div>
        <div>
            <label for="confirm_password" class="mb-2 block text-sm font-medium text-slate-700">Confirm new password</label>
            <input id="confirm_password" name="confirm_password" type="password" required minlength="8"
                class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none transition focus:border-gold focus:bg-white focus:ring-2 focus:ring-amber-100">
        </div>
        <button type="submit" class="w-full rounded-2xl bg-ink px-4 py-3 text-sm font-semibold text-white transition hover:bg-slate-800">
            Update password
        </button>
    </form>
</section>
{% endblock %}
