<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}User Authentication System{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ink: "#1F2937",
                        mist: "#F7F4EE",
                        gold: "#B7791F",
                        ember: "#C05621",
                        pine: "#22543D"
                    },
                    boxShadow: {
                        soft: "0 24px 60px rgba(31, 41, 55, 0.12)"
                    }
                }
            }
        };
    </script>
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="min-h-screen bg-mist text-ink">
    <div class="fixed inset-0 -z-10 overflow-hidden">
        <div class="absolute -top-24 left-[-8rem] h-72 w-72 rounded-full bg-amber-200/60 blur-3xl"></div>
        <div class="absolute right-[-10rem] top-1/3 h-80 w-80 rounded-full bg-emerald-200/50 blur-3xl"></div>
        <div class="absolute bottom-[-8rem] left-1/3 h-72 w-72 rounded-full bg-orange-200/40 blur-3xl"></div>
    </div>

    <main class="mx-auto flex min-h-screen w-full max-w-6xl items-center justify-center px-4 py-10 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
    </main>
    <script src="/static/js/form-validation.js"></script>
</body>
</html>
