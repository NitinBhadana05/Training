<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}User Authentication System{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ink: "#111827",
                        mist: "#eef2f6",
                        gold: "#c79443",
                        ember: "#c45c3b",
                        pine: "#22543D",
                        panel: "#f8fafc",
                        steel: "#64748b",
                        night: "#0f172a",
                        cyan: "#0ea5e9"
                    },
                    boxShadow: {
                        soft: "0 24px 60px rgba(15, 23, 42, 0.12)",
                        panel: "0 10px 30px rgba(15, 23, 42, 0.08)"
                    },
                    fontFamily: {
                        sans: ["Manrope", "sans-serif"],
                        display: ["Space Grotesk", "sans-serif"]
                    }
                }
            }
        };
    </script>
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="min-h-screen bg-mist text-ink antialiased">
    <div class="fixed inset-0 -z-10 overflow-hidden">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,_rgba(14,165,233,0.12),_transparent_24%),radial-gradient(circle_at_top_right,_rgba(199,148,67,0.12),_transparent_18%),linear-gradient(180deg,_#f8fbfd_0%,_#eef2f6_48%,_#e9eef5_100%)]"></div>
        <div class="absolute inset-0 opacity-50 [background-image:linear-gradient(rgba(148,163,184,0.08)_1px,transparent_1px),linear-gradient(90deg,rgba(148,163,184,0.08)_1px,transparent_1px)] [background-size:42px_42px]"></div>
        <div class="absolute -top-24 left-[-8rem] h-72 w-72 rounded-full bg-sky-200/40 blur-3xl"></div>
        <div class="absolute right-[-10rem] top-1/3 h-80 w-80 rounded-full bg-amber-200/35 blur-3xl"></div>
        <div class="absolute bottom-[-8rem] left-1/3 h-72 w-72 rounded-full bg-slate-300/30 blur-3xl"></div>
    </div>

    <main class="mx-auto flex min-h-screen w-full max-w-7xl items-center justify-center px-4 py-10 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
    </main>
    <script src="/static/js/form-validation.js"></script>
</body>
</html>
