{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<section class="grid w-full gap-6 xl:grid-cols-[1.08fr_0.92fr]">
    

    <div class="admin-glass admin-card rounded-[2rem] border border-slate-200/70 p-6 lg:p-8">
        <p class="text-xs font-semibold uppercase tracking-[0.24em] text-steel">Credential check</p>
        <h2 class="mt-2 font-display text-3xl font-bold text-night">Log in</h2>
        <p class="mt-3 text-sm leading-6 text-steel"></p>

        {% include "partials/messages.html" %}

        <form method="post" action="/login" class="mt-8 space-y-5" data-validate>
            <div>
                <label for="email" class="mb-2 block text-sm font-medium text-slate-700">Email address</label>
                <input id="email" name="email" type="email" value="{{ form_data.email if form_data else '' }}" required
                    class="w-full rounded-[1.35rem] border border-slate-200 bg-white px-4 py-3.5 outline-none ring-1 ring-slate-200 transition focus:border-sky-300 focus:ring-sky-200">
            </div>
            <div>
                <div class="mb-2 flex items-center justify-between">
                    <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
                    <a href="/forgot-password" class="text-sm font-semibold text-cyan hover:text-sky-700">Forgot password?</a>
                </div>
                <input id="password" name="password" type="password" required
                    class="w-full rounded-[1.35rem] border border-slate-200 bg-white px-4 py-3.5 outline-none ring-1 ring-slate-200 transition focus:border-sky-300 focus:ring-sky-200">
            </div>
            <button type="submit"
                class="w-full rounded-[1.35rem] bg-night px-4 py-3.5 text-sm font-semibold text-white shadow-panel transition hover:bg-slate-800">
                Sign in to dashboard
            </button>
        </form>

        <div class="mt-6 flex items-center justify-between gap-4 rounded-[1.35rem] bg-white/90 px-4 py-4 ring-1 ring-slate-200">
            <div>
                <p class="text-sm font-semibold text-night">New here?</p>
                <p class="text-sm text-steel">Create an account.</p>
            </div>
            <a href="/signup" class="rounded-xl border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50">Create account</a>
        </div>
    </div>
</section>
{% endblock %}
