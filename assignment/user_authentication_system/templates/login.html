{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<section class="grid w-full gap-8 lg:grid-cols-[0.95fr_1.05fr]">
    <div class="rounded-[2rem] bg-white p-6 shadow-soft sm:p-8">
        <p class="text-sm font-medium uppercase tracking-[0.2em] text-gold">Access portal</p>
        <h1 class="mt-3 text-3xl font-semibold">Log in</h1>
        <p class="mt-2 text-sm text-slate-600"></p>

        {% include "partials/messages.html" %}

        <form method="post" action="/login" class="space-y-5" data-validate>
            <div>
                <label for="email" class="mb-2 block text-sm font-medium text-slate-700">Email address</label>
                <input id="email" name="email" type="email" value="{{ form_data.email if form_data else '' }}" required
                    class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none transition focus:border-gold focus:bg-white focus:ring-2 focus:ring-amber-100">
            </div>
            <div>
                <div class="mb-2 flex items-center justify-between">
                    <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
                    <a href="/forgot-password" class="text-sm font-medium text-ember hover:text-orange-700">Forgot password?</a>
                </div>
                <input id="password" name="password" type="password" required
                    class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none transition focus:border-gold focus:bg-white focus:ring-2 focus:ring-amber-100">
            </div>
            <button type="submit"
                class="w-full rounded-2xl bg-ink px-4 py-3 text-sm font-semibold text-white transition hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-300">
                Sign in
            </button>
        </form>

        <p class="mt-6 text-sm text-slate-600">
            Need an account?
            <a href="/signup" class="font-semibold text-ember transition hover:text-orange-700">Create one</a>
        </p>
    </div>

   
</section>
{% endblock %}
